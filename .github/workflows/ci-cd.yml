name: Pipeline DevSecOps - CI

on:
  push:
    branches: [ "main", "development", "stage" ]

jobs:
  build:
    name: Compilacao e Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Instalar Dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt flake8
      - name: Validacao do Build Docker
        run: docker build -t gestao-tarefas:ci-test .

  testes:
    name: Testes Automatizados
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Preparar Ambiente de Teste
        run: |
          pip install pytest
      - name: Executar Testes Unitarios e Funcionais
        run: pytest test_app.py
